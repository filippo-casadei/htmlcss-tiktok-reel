<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">

      <div class="top-bar">

        <div class="play-button">
          <i class="bi bi-play-btn"></i>
        </div>

        <div class="menu">
          <p class="esplora">Esplora</p>
          <p class="seguiti">Seguiti</p>
          <p class="per-te">Per te</p>
        </div>

        <div class="search-button">
          <i class="bi bi-search"></i>
        </div>

      </div>
    </header>

    <main>

      <!-- Sidebar -->
      <div class="sidebar">

        <div class="sidebar-items">

          <div class="sidebar-icon logoboo">
            <img src="./assets/img/boolean_logo.png" alt="il logo di boolean">
          </div>

          <div class="sidebar-icon">
            <i class="bi bi-heart-fill"></i>
            <p class="numbers">588</p>
          </div>

          <div class="sidebar-icon">
            <i class="bi bi-chat-dots-fill"></i>
            <p class="numbers">18</p>
          </div>

          <div class="sidebar-icon">
            <i class="bi bi-bookmark-fill"></i>
            <p class="numbers">638</p>
          </div>

          <div class="sidebar-icon">
            <i class="bi bi-sign-turn-slight-right-fill"></i>
            <p class="numbers">491</p>
          </div>

        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer>

    </footer>
  </div>

</body>

</html>
